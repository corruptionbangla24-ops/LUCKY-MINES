<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCKY MINES - DIAMOND HUNT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল (অতিরিক্ত ব্যালেন্স বক্স ছাড়া একদম ইন্টারন্যাশনাল লাক্সারি ক্লিন ভাই ভাই) -->
    <div class="header">
        <div class="brand">
            <div class="name">LUCKY MINES</div>
            <div class="game">DIAMOND HUNT</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
        </div>
    </div>

    <!-- 💎 ডায়মন্ড মাল্টিপ্লায়ার বাফার ইন্ডিকেটর বার -->
    <div class="multiplier-bar">
        <div class="next-box" id="next-mult-display">NEXT: x1.15</div>
    </div>

    <!-- 💣 ৫×环境 ২৫টি নিয়ন মাইনস গ্রিড বোর্ড ভাই ভাই -->
    <div class="mines-zone">
        <div class="mines-window-frame">
            <div class="grid-container" id="mines-grid">
                <!-- ২৫টি স্লট ঘর জাভাস্ক্রিপ্ট দিয়ে ওয়ান-শটে অটো রেন্ডার হবে ভাই ভাই -->
            </div>
        </div>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">বাজি ধরে BET বোতাম চাপুন ভাই!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳১-৳২০০০0 প্লাস-মাইনাস ও মাইনস কাউন্টার পাশাপাশি লক ভাই) -->
    <div class="footer-controls">
        <div class="control-top-row">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 55px;">
                    <div style="font-size: 8px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 13px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <!-- 💣 বোমার সংখ্যা কাস্টম চয়েস বক্স (১-২৪টি কড়া লক ভাই ভাই) -->
            <div class="mines-selector">
                <button class="bet-btn-nav" onclick="adjustMines('minus')">−</button>
                <div style="text-align: center; width: 65px;">
                    <div style="font-size: 8px; color: #aaa; font-weight: bold;">MINES</div>
                    <div style="font-size: 13px; font-weight: 900; color: #fff;" id="mines-display">৩ 💣</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustMines('plus')">+</button>
            </div>
        </div>

        <div class="control-bottom-row">
            <button class="play-btn-main" id="bet-action-btn" onclick="handleMinesMainAction()">BET</button>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let currentMinesCount = 3;
        let gameActive = false; 
        let isMuted = false;
        let activeGameToken = null;

        // 🚀 [মাস্টার সিঙ্ক]: ২৫টি স্লট গ্রিড অটো-জেনারেটর এবং লাইভ ক্লিকার চাবি ভাই ভাই
        function initMinesGameBoard() {
            const gridContainer = document.getElementById("mines-grid");
            gridContainer.innerHTML = "";
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement("div");
                cell.className = "mines-cell";
                cell.id = `cell-${i}`;
                cell.setAttribute("onclick", `handleGridCellClick(${i})`);
                gridContainer.appendChild(cell);
            }
        }

        // 🛫 ১. প্রধান BET এবং CASH OUT বোতামের ডাইনামিক সুইচ ফাংশন ভাই ভাই
        async function handleMinesMainAction() {
            const actionBtn = document.getElementById("bet-action-btn");
            
            if (!gameActive) {
                // 🚀 বাজি ধরার ফ্রেশ গেটওয়ে অন ফায়ার ভাই ভাই
                actionBtn.disabled = true;
                playAudio('click');

                try {
                    const response = await fetch(`${SERVER_URL}/api/mines-start`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: urlUserId,
                            amount: parseFloat(currentBet),
                            wallet: urlWallet,
                            mines: currentMinesCount
                        })
                    });
                    const data = await response.json();

                    if (data && data.success === true) {
                        balance = parseFloat(data.balance);
                        activeGameToken = data.token;
                        gameActive = true;
                        
                        actionBtn.disabled = false;
                        actionBtn.innerText = "CASH OUT";
                        actionBtn.className = "play-btn-main cashout-active-btn";
                        
                        document.getElementById("win-text-msg").innerText = "💎 সাবধানে ডায়মন্ড খুঁজুন ভাই ভাই!";
                        document.getElementById("next-mult-display").innerText = `NEXT: x${data.nextMultiplier.toFixed(2)}`;
                        
                        initMinesGameBoard(); // ২৫টি ঘর রিসেট লক
                        if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    } else {
                        actionBtn.disabled = false;
                        alert(data.message || "❌ Insufficient Balance! Please Recharge.");
                    }
                } catch (e) {
                    actionBtn.disabled = false;
                    alert("⚠️ সেশন আউট! আবার BET বোতাম চাপুন ভাই ভাই।");
                }
            } else {
                // 💰 ক্যাশআউট মেরে লাভ পকেটে ভরার রাজকীয় সিকিউরিটি বর্ম ভাই ভাই
                actionBtn.disabled = true;
                playAudio('win');

                try {
                    const response = await fetch(`${SERVER_URL}/api/mines-cashout`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: urlUserId, wallet: urlWallet, token: activeGameToken })
                    });
                    const data = await response.json();

                    if (data && data.success === true) {
                        balance = parseFloat(data.balance);
                        document.getElementById("win-status-box").className = "win-status-container win-glow-bar";
                        document.getElementById("win-text-msg").innerText = `🏆 ক্যাশআউট সাকসেস! জিতেছে: ৳${data.winAmount}`;
                        revealEntireBoard(data.minesPositions, true); // সব বোমা ফাস লক
                        resetMinesToStartState();
                    }
                } catch (e) { actionBtn.disabled = false; }
            }
        }

                // 💎 ২. ২৫টি ঘরের যেকোনো একটিতে চাপ দিলে ডায়মন্ড না বোমা বের হবে তার লাইভ ক্যালকুলেটর চাবি ভাই ভাই
        async function handleGridCellClick(index) {
            if (!gameActive) return;
            const targetCell = document.getElementById(`cell-${index}`);
            if (targetCell.classList.contains("revealed-diamond") || targetCell.classList.contains("revealed-mine")) return;

            playAudio('click');

            try {
                const response = await fetch(`${SERVER_URL}/api/mines-reveal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: urlUserId, wallet: urlWallet, token: activeGameToken, index: index })
                });
                const data = await response.json();

                if (data && data.success === true) {
                    if (data.status === "diamond") {
                        playAudio('spin'); // ডায়মন্ড মেলার সুইট টুইন সাউন্ড ভাই ভাই
                        targetCell.className = "mines-cell revealed-diamond";
                        targetCell.innerHTML = `💎`;
                        document.getElementById("next-mult-display").innerText = `NEXT: x${data.nextMultiplier.toFixed(2)}`;
                        document.getElementById("bet-action-btn").innerText = `CASH (৳${data.currentWin.toFixed(0)})`;
                    } else if (data.status === "blast") {
                        playAudio('wheel'); // বোমা ব্লাস্ট হওয়ার ফলব্যাক সাউন্ড ভাই ভাই
                        targetCell.className = "mines-cell revealed-mine";
                        targetCell.innerHTML = `💥`;
                        
                        document.getElementById("win-status-box").className = "win-status-container lose-glow-bar";
                        document.getElementById("win-text-msg").innerText = "❌ ওহ! বোমা ব্লাস্ট হয়ে গেছে ভাই ভাই।";
                        
                        revealEntireBoard(data.minesPositions, false);
                        resetMinesToStartState();
                    }
                }
            } catch (e) { console.error("Reveal Error"); }
        }

        function revealEntireBoard(minesPositions, isUserWinner) {
            for (let i = 0; i < 25; i++) {
                const cell = document.getElementById(`cell-${i}`);
                if (cell && !cell.innerHTML) {
                    if (minesPositions.includes(i)) {
                        cell.className = "mines-cell revealed-mine-hide";
                        cell.innerHTML = `💣`;
                    } else {
                        cell.className = "mines-cell revealed-diamond-hide";
                        cell.innerHTML = `💎`;
                    }
                }
            }
        }

        function resetMinesToStartState() {
            gameActive = false;
            activeGameToken = null;
            const actionBtn = document.getElementById("bet-action-btn");
            actionBtn.disabled = false;
            actionBtn.innerText = "BET";
            actionBtn.className = "play-btn-main";
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        }

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/mines-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                }
            } catch (e) { console.error("Balance fetch delayed"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
            initMinesGameBoard();
        };

        function adjustBet(action) {
            if (gameActive) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else if (currentBet <= 1000) currentBet -= 100;
                else currentBet -= 500;
            }
            if (action === 'plus' && currentBet < 20000) { // 🚀 সর্বোচ্চ ২০০০০ লিমিট লক ভাই ভাই
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else if (currentBet < 1000) currentBet += 100;
                else currentBet += 500;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 20000) currentBet = 20000;
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function adjustMines(action) {
            if (gameActive) return;
            if (action === 'minus' && currentMinesCount > 1) currentMinesCount -= 1;
            if (action === 'plus' && currentMinesCount < 24) currentMinesCount += 1;
            document.getElementById("mines-display").innerText = `${currentMinesCount} 💣`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
        }

        // 🎯 [৪টি ওরিজিনাল প্রিমিয়াম ক্যাসিনো সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3'),
            wheel: new Audio('wheel1.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; 
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
